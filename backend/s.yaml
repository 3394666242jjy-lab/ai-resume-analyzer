# 阿里云 Serverless 函数计算配置
edition: 3.0.0
name: ai-resume-analyzer
access: default

vars:
  region: cn-hangzhou
  service:
    name: ai-resume-service
    description: AI 赋能的智能简历分析系统

resources:
  ai_resume_analyzer:
    component: fc3
    props:
      region: ${vars.region}
      serviceName: ${vars.service.name}
      serviceDescription: ${vars.service.description}
      functionName: resume-api-v5
      description: 简历分析 API 服务
      runtime: custom.debian11
      cpu: 1
      memorySize: 2048
      diskSize: 512
      timeout: 120
      code: ./
      customRuntimeConfig:
        command:
          - bash
        args:
          - /code/bootstrap
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
