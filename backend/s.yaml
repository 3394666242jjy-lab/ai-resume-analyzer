# 阿里云 Serverless 应用中心部署配置
# 使用方式：在 backend 目录下执行 `s deploy`
edition: 3.0.0
name: ai-resume-analyzer
access: default

vars:
  region: cn-hangzhou
  service:
    name: ai-resume-service
    description: AI 赋能的智能简历分析系统

resources:
  ai_resume_analyzer:
    component: fc3
    props:
      region: ${vars.region}
      serviceName: ${vars.service.name}
      serviceDescription: ${vars.service.description}
      functionName: resume-api-v5
      description: 智能简历 API 服务
      runtime: custom.debian11
      cpu: 1
      memorySize: 2048
      diskSize: 512
      timeout: 120
      # 部署代码目录（.env 等敏感文件已通过 .fcignore 排除）
      code: ./
      # 注意：环境变量（API Key 等）请在部署后，到阿里云 FC 控制台手动配置
      # 切勿将真实 API Key 写入代码或 s.yaml 中！
      customRuntimeConfig:
        command:
          - bash
        args:
          - /code/bootstrap
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - HEAD
              - PATCH
